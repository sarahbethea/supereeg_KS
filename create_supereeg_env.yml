name: supereeg_env
channels:
  - defaults
dependencies:
  - python
  - pip
  - pip:
    - git+https://github.com/joseJCS0/supereeg_JCS.git
    - nilearn
    - future
    - hypertools
    - torch --index-url https://download.pytorch.org/whl/cu126
    - torchvision --index-url https://download.pytorch.org/whl/cu126
    - gpytorch
  - scikit-learn
  - scikit-image
  - pandas
  - seaborn
  - matplotlib
  - scipy
  - imageio
  - pytest
  - pytables
  - notebook
  - cupy
